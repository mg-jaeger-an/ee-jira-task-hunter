name: Jira Manager Daily (KST 09:00)

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-jira-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "jira manager/requirements.txt"

      - name: Run Cursor Cloud automation
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          # Always use this Actions repo (avoids wrong/missing CURSOR_REPO_* secrets).
          CURSOR_REPO_URL: https://github.com/${{ github.repository }}
          CURSOR_REPO_REF: ${{ github.ref_name }}
          CURSOR_MODEL_ID: composer-2.5
          SLACK_MCP_CLIENT_ID: ${{ secrets.SLACK_MCP_CLIENT_ID }}
        run: |
          echo "CURSOR_REPO_URL=https://github.com/${GITHUB_REPOSITORY}"
          echo "CURSOR_REPO_REF=${GITHUB_REF_NAME}"
          python "jira manager/cursor_cloud_run.py"

      - name: Upload markdown run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jira-manager-log-${{ github.run_id }}
          path: jira manager/logs/*.md
          if-no-files-found: warn
